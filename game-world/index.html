<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doormates</title>


  <link rel="stylesheet" href="/app/styles/resets.css?v=">
  <link rel="stylesheet" href="/app/styles/character-creator/character-creator.css?v=">
  <link rel="stylesheet" href="/app/styles/typo.css?v=">
  <link rel="stylesheet" href="/app/styles/btns.css?v=">
  <link rel="stylesheet" href="/app/styles/game-world/background-panel.css?v=">
  <link rel="stylesheet" href="/app/styles/game-world/game-world.css?v=">
  <link rel="stylesheet" href="/app/styles/game-world/character.css?v=">
  <link rel="stylesheet" href="/app/styles/game-world/rooms.css?v=">

  <link rel="stylesheet" href="/app/styles/game-world/pupu-room.css?v=">

  <link rel="stylesheet" href="/app/styles/game-world/feuchtigkeit-room.css?v=">

  <link rel="stylesheet" href="/app/styles/game-world/traffic-room.css?v=">



  <script src="/app/js/fabric.min.js"></script>

</head>

<body class="">



  <a id="restart-btn" class="font-compagnon-light " href="/doormates-page.html">
    Restart game
  </a>

  <main id="world" class="world-wrapper">



    <div id="world-bg" class="bg-panel">
      <div class="bg-panel-wrapper">



        <section class="bg-panel-section">

          <img src="/app/assets/images/game-world/tur-frame.png" class="bg-panel-door-frame">


          <div class="door-container" data-id="1">
            <img src="/app/assets/images/game-world/111.png" id="door-image" class="bg-panel-door" data-door-id="1"
              data-question="I'm super angry today.">
            <img src="/app/assets/images/game-world/Leute1.png" class="door-overlay-image overlay-leute1" />
            <audio class="door-audio" src="/app/assets/audio/game-world/ahhh.m4a" preload="auto"></audio>
          </div>


          <div class="picture-wrapper">
            <img src="/app/assets/images/game-world/frame.png" class="picture-frame">
            <img src="/app/assets/images/game-world/pupu-sad.png" class="picture-content">
          </div>
        </section>



        <section class="bg-panel-section">

          <img src="/app/assets/images/game-world/tur-frame.png" class="bg-panel-door-frame">

          <div class="door-container" data-id="2">
            <img src="/app/assets/images/game-world/22.png" id="door-image-22" class="bg-panel-door" data-door-id="2"
              data-question="Crazy! I have a friend who really enjoys using the restroom.">
            <img src="/app/assets/images/game-world/Leute2.png" class="door-overlay-image overlay-leute2  " />
            <audio class="door-audio" src="/app/assets/audio/game-world/hello.mp3" preload="auto"></audio>
          </div>


          <div class="picture-wrapper">
            <img src="/app/assets/images/game-world/frame.png" class="picture-frame">
            <img src="/app/assets/images/game-world/man-klo1.png" class="picture-content">
          </div>
        </section>



        <section class="bg-panel-section">

          <img src="/app/assets/images/game-world/tur-frame.png" class="bg-panel-door-frame">

          <div class="door-container" data-id="3">
            <img src="/app/assets/images/game-world/333.png" id="door-image-33" class="bg-panel-door" data-door-id="3"
              data-question="Finally, class is over. I had a whole day of classes today." alt="Human">
            <img src="/app/assets/images/game-world/Leute3.png" class="door-overlay-image overlay-leute3" />
            <audio class="door-audio" src="/app/assets/audio/game-world/oof.mp3" preload="auto"></audio>
          </div>


          <div class="picture-wrapper">
            <img src="/app/assets/images/game-world/frame.png" class="picture-frame">
            <img src="/app/assets/images/game-world/noodle.png" class="picture-content">
          </div>
        </section>



        <section class="bg-panel-section">

          <img src="/app/assets/images/game-world/tur-frame.png" class="bg-panel-door-frame">

          <div class="door-container" data-id="4">
            <img src="/app/assets/images/game-world/44.png" id="door-image-44" class="bg-panel-door" data-door-id="4"
              data-question="I feel like horses always give me a sense of familiarity.">
            <img src="/app/assets/images/game-world/Leute4.png" class="door-overlay-image overlay-leute4" />
            <audio class="door-audio" src="/app/assets/audio/game-world/ohh1.m4a" preload="auto"></audio>
          </div>


          <div class="picture-wrapper">
            <img src="/app/assets/images/game-world/frame.png" class="picture-frame">
            <img src="/app/assets/images/game-world/cloud-frame.png" class="picture-content">
          </div>
        </section>



        <section class="bg-panel-section">

          <img src="/app/assets/images/game-world/tur-frame.png" class="bg-panel-door-frame">

          <div class="door-container" data-id="5">
            <img src="/app/assets/images/game-world/111.png" id="door-image-55" class="bg-panel-door" data-door-id="5"
              data-question="OMG! You can't even imagine what i just went through.">
            <img src="/app/assets/images/game-world/Leute5.png" class="door-overlay-image overlay-leute5" />
            <audio class="door-audio" src="/app/assets/audio/game-world/evil-laugh.mp3" preload="auto"></audio>
          </div>


          <div class="picture-wrapper">
            <img src="/app/assets/images/game-world/frame.png" class="picture-frame">
            <img src="/app/assets/images/game-world/cone.png" class="picture-content">
          </div>
        </section>



        <section class="bg-panel-section">

          <img src="/app/assets/images/game-world/tur-frame.png" class="bg-panel-door-frame">

          <div class="door-container" data-id="6">
            <img src="/app/assets/images/game-world/22.png" class="bg-panel-door"
              data-question="What superpower do you want to have?">
            <img src="/app/assets/images/game-world/Leute6.png" class="door-overlay-image overlay-leute6" />
            <audio class="door-audio" src="/app/assets/audio/game-world/old-man.m4a" preload="auto"></audio>
          </div>
        </section>



        <section class="bg-panel-section">

          <img src="/app/assets/images/game-world/stone00.png" id="falling-stone-0" class="falling-stone-0" />

          <audio id="stone-sound" src="/app/assets/audio/game-world/rock1.m4a" preload="auto"></audio>
          <img src="/app/assets/images/game-world/stone11.png" id="falling-stone-1" class="falling-stone-1" />
          <audio id="stone-sound2" src="/app/assets/audio/game-world/rock2.m4a" preload="auto"></audio>
          <img src="/app/assets/images/game-world/stone22.png" id="falling-stone-2" class="falling-stone-2" />
          <audio id="stone-sound3" src="/app/assets/audio/game-world/rock3.m4a" preload="auto"></audio>



          <img src="/app/assets/images/game-world/tur-frame.png" class="bg-panel-door-frame">
          <div class="door-container">
            <img src="/app/assets/images/game-world/333.png" class="bg-panel-door"
              data-question="What superpower do you want to have?">
            <img src="/app/assets/images/game-world/Leute3.png" class="door-overlay-image overlay-leute7 " />
            <audio class="door-audio" src="/app/assets/audio/game-world/ohh1.m4a" preload="auto"></audio>
          </div>
        </section>

      </div>



      <div class="floor-grid"></div>

      <!-- MAYBE USE LATER? -->
      <!-- <div class="blue-grid">
                  <div class="marquee-box1">
                    <span class="marquee-text1" id="marquee-text1"></span>
                  </div>
                </div> -->

      <div class="yellow-wall"></div>

      <div class="lower-wall">
        <div class="green-plank"></div>
      </div>

      <div class="triangle-corner"></div>
      <div class="roof">
        <!-- MAYBE USE LATER? -->
        <!-- <div class="marquee-box">
                    <span class="marquee-text" id="marquee-text">
                    </span>
                  </div> -->
      </div>

    </div>




    <div id="character" class="character">
      <img src="" alt="character image here">
    </div>



    <blockquote id="speech-bubble" class="speech bubble font-compagnon-light-speechbubble">
      <span id="bubble-text">我今天过的很糟糕</span>

      <!-- For door 1 -->
      <div class="bubble-why why-door-1" onclick="handleWhyClick(1)">why</div>

      <!-- For door 2 -->
      <div class="bubble-why why-door-2" onclick="handleWhyClick(2)">weiter</div>

      <!-- For door 3 -->
      <div class="bubble-why why-door-3" onclick="handleWhyClick(3)">weiter</div>

      <!-- For door 4 -->
      <div class="bubble-why why-door-4" onclick="handleWhyClick(4)">weiter</div>

      <!-- For door 5 -->
      <div class="bubble-why why-door-5" onclick="handleWhyClick(5)">weiter</div>


      <div class="bubble-answer" onclick="togglePanel()" style="display: none;">answer</div>

      <button class="open-door-button" onclick="openDoor_fromOutside('door-image', '/pupu-room.html')"
        style="display: none;">Open</button>
      <button class="open-door-button22" onclick="openDoor_fromOutside('door-image-22', '/peeing-cat-room.html')"
        style="display: none;">Open</button>
      <button class="open-door-button33" onclick="openDoor_fromOutside('door-image-33', '/feuchtigkeit-room.html')"
        style="display: none;">Open</button>
      <button class="open-door-button44" onclick="openDoor_fromOutside('door-image-44', '/horse-room.html')"
        style="display: none;">Open</button>
      <button class="open-door-button55" onclick="openDoor_fromOutside('door-image-55', '/traffic-room.html')"
        style="display: none;">Open</button>
    </blockquote>


    <div id="right-panel">

      <div id="draw-area">
        <canvas id="canvas" width="300" height="300"></canvas>
      </div>

      <div class="controls font-compagnon-light-speechbubble" id="controls">
        <button onclick="saveDrawing()">save</button>
        <button onclick="clearCanvas()">clear</button>
        <button onclick="undo()">undo</button>

        <div class="tools font-compagnon-light-speechbubble">
          <label>color: <input type="color" id="colorPicker" value="#000000" /></label>
          <label>thickness: <input type="range" id="thickness" min="1" max="20" value="2" /></label>
        </div>
      </div>

    </div>

  </main>


  <script src="/app/js/rooms/room.js"></script>
  <script src="/app/js/doormates/doormates.js"></script>



  <script src="/app/js/game-world/game-world.js"></script>
  <script src="/app/js/game-world/game-world_door-illustrations.js"></script>
</body>

</html>
