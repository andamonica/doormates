<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doormates</title>

    
    <link rel="stylesheet" href="/app/styles/resets.css?v=">
    <link rel="stylesheet" href="/app/styles/game-world/background-panel.css?v=">
    <link rel="stylesheet" href="/app/styles/game-world/rooms.css?v=">

  <body class=""><!-- traffic tur -->
         
 <div class="room-wrapper">
       
    <img src="/app/assets/images/traffic-room/raum6-5.png" class="background" alt="全屏照片">



     <!-- rotate tur -->

  <img src="/app/assets/images/traffic-room/rotate-tur-blau.png"
       id="door-image4"
       class="door"
       alt="自定义图片"
       onclick="openDoor()" />


    <!-- 左边视频 -->
    <img src="/app/assets/images/traffic-room/traffic-cone.gif" class="left-video" autoplay muted loop/>

   
    <!-- 右边图像 -->
    <img src="/app/assets/images/traffic-room/board.png" class="board-image" alt="板子" />
     <!-- 答案输入框 -->
      
   
    <!-- 紧贴 board 的图片 -->
    <img id="rotate-image" src="/app/assets/images/traffic-room/line.png" class="rotate-image" />

    <!-- 叠加答案图像（默认可设 hidden） -->
    <img id="success-image" src="/app/assets/images/traffic-room/green-light.png" class="success-image" />

   <div class="answer-box font-compagnon-light-submit">
        <input type="text" id="answer-input" placeholder="Enter a number" />
       <button id="check-answer">Submit</button>
       
     </div>

    <!-- 音频 -->
    <audio id="correct-audio" src="/app/assets/audio/traffic-room/success.mp3" preload="auto"></audio>
    <audio id="wrong-audio" src="/app/assets/audio/traffic-room/you-stupid-cat.mp3" preload="auto"></audio>
  </div>
  
  <script src="/app/js/rooms/room.js"></script>

  

    <script src="/app/js/rooms/traffic-room.js"></script>
  </body>
