<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doormates</title>


  <link rel="stylesheet" href="/app/styles/resets.css?v=">
  <link rel="stylesheet" href="/app/styles/game-world/background-panel.css?v=">
  <link rel="stylesheet" href="/app/styles/game-world/rooms.css?v=">

  <link rel="stylesheet" href="/app/styles/game-world/peeing-cat-room.css">
</head>

<body class=""><!-- peeing-cat tur -->



  <!-- rotate tur -->
  <div class="room-wrapper">
    <img src="/app/assets/images/rooms/rotate-tur-rosa.png" id="door-image1" class="door" alt="自定义图片"
      onclick="openDoor()" />

    <main class="wrapper-page">



      <img src="/app/assets/images/rooms/raum3-7.png" class="background" alt="全屏照片">
      <div class="content-layer">
        <img src="/app/assets/images/rooms/shower.gif" class="left-video" id="bg-video">
        <audio src="/app/assets/audio/rooms/swipeaway.m4a" id="bg-audio" loop></audio>
        <!-- 新增图片 -->
        <img src="/app/assets/images/rooms/klo.png" class="right-image" alt="Related Photo" />
      </div>

      <!-- 四张小图 + audio -->

      <img src="/app/assets/images/rooms/yellowduck.png" data-audio="../app/assets/audio/rooms/Universität.m4a"
        class="overlay-image bounce-on-hover1" />


      <img src="/app/assets/images/rooms/greenduck.png" data-audio="../app/assets/audio/rooms/Der.m4a"
        class="overlay-image bounce-on-hover2" />


      <img src="/app/assets/images/rooms/pinkduck.png" data-audio="../app/assets/audio/rooms/Kürzung.m4a"
        class="overlay-image bounce-on-hover3" />


      <img src="/app/assets/images/rooms/purpleduck.png" data-audio="../app/assets/audio/rooms/Berlin.m4a"
        class="overlay-image bounce-on-hover4" />

    </main>
  </div>

  <script src="/app/js/rooms/room.js"></script>



</body>

</html>
