<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Doormates</title>
  <link href="/app/styles/resets.css" rel="stylesheet" />
  <link href="/app/styles/character-creator/character-creator.css" rel="stylesheet" />
  <link href="/app/styles/typo.css" rel="stylesheet" />
  <link href="/app/styles/btns.css" rel="stylesheet" />
  <link href="/app/styles/game-world/background-panel.css" rel="stylesheet" />
  <link href="/app/styles/game-world/doors.css" rel="stylesheet" />
  <link href="/app/styles/game-world/game-world.css" rel="stylesheet" />
  <link href="/app/styles/game-world/character.css" rel="stylesheet" />
  <link href="/app/styles/game-world/rooms.css" rel="stylesheet" />
  <link href="/app/styles/doormates/doormates.css" rel="stylesheet" />
  <link href="/app/styles/page-cover.css" rel="stylesheet" />
  <link href="/app/styles/game-world/overlay-ui/overlay-ui.css" rel="stylesheet" />
  <link href="/app/styles/game-world/apartments/variables.css" rel="stylesheet" />
  <link href="/app/styles/game-world/apartments/background-panel.css" rel="stylesheet" />
  <link href="/app/styles/game-world/apartments/background-elements.css" rel="stylesheet" />
  <script src="/app/js/fabric.min.js"></script>
  <script src="/app/js/js.cookie.min.js"></script>
  <link rel="stylesheet" href="/app/styles/game-world/pupu-room.css">
  <link rel="stylesheet" href="/app/styles/game-world/feuchtigkeit-room.css">
  <link rel="stylesheet" href="/app/styles/game-world/horse-room.css">
  <link rel="stylesheet" href="/app/styles/game-world/traffic-room.css">
</head>

<body class="game-world-apartments-page">
  <div class="overlay-ui" id="overlay-ui">
    <div class="overlay-ui-btn-container overlay-ui-btn-container-top">
      <button class="btn force-pointer-events" data-target="/map/index.html" id="btn-back-to-map">
        Back to Map
      </button>
      <button class="btn force-pointer-events" data-target="/doormates/index.html" id="btn-restart-game">
        Restart Game
      </button>
    </div>
  </div>
  <div class="page-cover">
    <div class="font-compagnon-light" style="font-size: 5vw; text-align: center; ">
      <span>
        Get a bigger screen!
      </span>
    </div>
  </div>
  <a class="font-compagnon-light" href="/doormates-page/index.html" id="restart-btn">
    Restart game
  </a>
  <main class="world-wrapper" id="world">
    <div class="bg-panel" id="world-bg">
      <div class="bg-panel-wrapper">
        <section class="bg-panel-section">
          <div class="door-container" data-id="1">
            <img class="door-frame" src="/app/assets/images/game-world/tur-frame.png" />
            <img class="door-image" data-door-id="1" data-question="I'm super angry today." id="door-image"
              src="/app/assets/images/game-world/111.png" />
            <img class="door-overlay-image" src="/app/assets/images/game-world/Leute1.png">
            <audio class="door-audio" preload="auto" src="/app/assets/audio/game-world/ahhh.m4a"></audio>
            </img>
          </div>
          <div class="picture-container">
            <img class="picture-frame" src="/app/assets/images/game-world/frame.png" />
            <img class="picture-content" src="/app/assets/images/game-world/pupu-sad.png" />
          </div>
        </section>
        <section class="bg-panel-section">
          <div class="door-container" data-id="2">
            <img class="door-frame" src="/app/assets/images/game-world/tur-frame.png" />
            <img class="door-image" data-door-id="2"
              data-question="Crazy! I have a friend who really enjoys using the restroom." id="door-image-22"
              src="/app/assets/images/game-world/22.png" />
            <img class="door-overlay-image" src="/app/assets/images/game-world/Leute2.png">
            <audio class="door-audio" preload="auto" src="/app/assets/audio/game-world/hello.mp3"></audio>
            </img>
          </div>
          <div class="picture-container">
            <img class="picture-frame" src="/app/assets/images/game-world/frame.png" />
            <img class="picture-content" src="/app/assets/images/game-world/man-klo1.png" />
          </div>
        </section>
        <section class="bg-panel-section">
          <div class="door-container" data-id="3">
            <img class="door-frame" src="/app/assets/images/game-world/tur-frame.png" />
            <img alt="Human" class="door-image" data-door-id="3"
              data-question="Finally, class is over. I had a whole day of classes today." id="door-image-33"
              src="/app/assets/images/game-world/333.png" />
            <img class="door-overlay-image" src="/app/assets/images/game-world/Leute3.png">
            <audio class="door-audio" preload="auto" src="/app/assets/audio/game-world/oof.mp3"></audio>
            </img>
          </div>
          <div class="picture-container">
            <img class="picture-frame" src="/app/assets/images/game-world/frame.png" />
            <img class="picture-content" src="/app/assets/images/game-world/noodle.png" />
          </div>
        </section>
        <section class="bg-panel-section">
          <div class="door-container" data-id="4">
            <img class="door-frame" src="/app/assets/images/game-world/tur-frame.png" />
            <img class="door-image" data-door-id="4"
              data-question="I feel like horses always give me a sense of familiarity." id="door-image-44"
              src="/app/assets/images/game-world/44.png" />
            <img class="door-overlay-image" src="/app/assets/images/game-world/Leute4.png">
            <audio class="door-audio" preload="auto" src="/app/assets/audio/game-world/ohh1.m4a"></audio>
            </img>
          </div>
          <div class="picture-container">
            <img class="picture-frame" src="/app/assets/images/game-world/frame.png" />
            <img class="picture-content" src="/app/assets/images/game-world/cloud-frame.png" />
          </div>
        </section>
        <section class="bg-panel-section">
          <div class="door-container" data-id="5">
            <img class="door-frame" src="/app/assets/images/game-world/tur-frame.png" />
            <img class="door-image" data-door-id="5"
              data-question="OMG! You can't even imagine what i just went through." id="door-image-55"
              src="/app/assets/images/game-world/111.png" />
            <img class="door-overlay-image" src="/app/assets/images/game-world/Leute5.png">
            <audio class="door-audio" preload="auto" src="/app/assets/audio/game-world/evil-laugh.mp3"></audio>
            </img>
          </div>
          <div class="picture-container">
            <img class="picture-frame" src="/app/assets/images/game-world/frame.png" />
            <img class="picture-content" src="/app/assets/images/game-world/cone.png" />
          </div>
        </section>
        <section class="bg-panel-section">
          <div class="door-container" data-id="6">
            <img class="door-frame" src="/app/assets/images/game-world/tur-frame.png" />
            <img class="door-image" data-question="What superpower do you want to have?"
              src="/app/assets/images/game-world/22.png" />
            <img class="door-overlay-image" src="/app/assets/images/game-world/Leute6.png">
            <audio class="door-audio" preload="auto" src="/app/assets/audio/game-world/old-man.m4a"></audio>
            </img>
          </div>
        </section>
      </div>
      <!-- <div class="floor-grid"></div> -->
      <!-- MAYBE USE LATER? -->
      <!-- <div class="blue-grid">
  <div class="marquee-box1">
    <span class="marquee-text1" id="marquee-text1"></span>
  </div>
</div> -->
      <div class="yellow-wall"></div>
      <div class="lower-wall">
        <div class="green-plank"></div>
      </div>
      <!-- <div class="triangle-corner"></div> -->
      <!-- <div class="roof"> -->
      <!-- MAYBE USE LATER? -->
      <!-- <div class="marquee-box">
    <span class="marquee-text" id="marquee-text">
    </span>
  </div> -->
      <!-- </div>  -->
    </div>
    <div class="character character-size-lg" id="character">
      <img alt="character image here" src="" />
    </div>
    <blockquote class="speech bubble font-compagnon-light-speechbubble" id="speech-bubble">
      <span id="bubble-text">我今天过的很糟糕</span>
      <!-- For door 1 -->
      <div class="bubble-why why-door-1" onclick="handleWhyClick(1)">why</div>
      <!-- For door 2 -->
      <div class="bubble-why why-door-2" onclick="handleWhyClick(2)">weiter</div>
      <!-- For door 3 -->
      <div class="bubble-why why-door-3" onclick="handleWhyClick(3)">weiter</div>
      <!-- For door 4 -->
      <div class="bubble-why why-door-4" onclick="handleWhyClick(4)">weiter</div>
      <!-- For door 5 -->
      <div class="bubble-why why-door-5" onclick="handleWhyClick(5)">weiter</div>
      <div class="bubble-answer" onclick="togglePanel()" style="display: none;">answer</div>
      <button class="open-door-button" onclick="openDoor_fromOutside('door-image', '/game-world/pupu-room')"
        style="display: none;">Open</button>
      <button class="open-door-button22" onclick="openDoor_fromOutside('door-image-22', '/game-world/peeing-cat-room')"
        style="display: none;">Open</button>
      <button class="open-door-button33"
        onclick="openDoor_fromOutside('door-image-33', '/game-world/feuchtigkeit-room')"
        style="display: none;">Open</button>
      <button class="open-door-button44" onclick="openDoor_fromOutside('door-image-44', '/game-world/horse-room')"
        style="display: none;">Open</button>
      <button class="open-door-button55" onclick="openDoor_fromOutside('door-image-55', '/game-world/traffic-room')"
        style="display: none;">Open</button>
    </blockquote>
    <div id="right-panel">
      <div id="draw-area">
        <canvas height="300" id="canvas" width="300"></canvas>
      </div>
      <div class="controls font-compagnon-light-speechbubble" id="controls">
        <button onclick="saveDrawing()">save</button>
        <button onclick="clearCanvas()">clear</button>
        <button onclick="undo()">undo</button>
        <div class="tools font-compagnon-light-speechbubble">
          <label>color: <input id="colorPicker" type="color" value="#000000" /></label>
          <label>thickness: <input id="thickness" max="20" min="1" type="range" value="2" /></label>
        </div>
      </div>
    </div>
  </main>
  <script src="/app/js/helper-functions/helper-functions.js"></script>
  <script src="/app/js/variables-global.js"></script>
  <script src="/app/js/rooms/room.js"></script>
  <script src="/app/js/doormates/doormates.js"></script>
  <script src="/app/js/overlay-ui/overlay-ui.js"></script>
  <script src="/app/js/game-worlds/apartments/apartments.js"></script>
  <script src="/app/js/game-worlds/apartments/apartments-door-illustrations.js"></script>
</body>
