<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="style.css">
</head>

            <div class="cell">

                <img src="assets/images/toilette.jpg">
                <img src="assets/images/horse3.jpg">

            <div class="cell">

                <img src="assets/images/skateboard.jpg">

                <img src="assets/images/leaves.jpg">
                <img src="assets/images/sofa9.jpg" class="active">
                <img src="assets/images/horse9.jpg">
            </div>
        </div>
    </div>

    <audio id="cellClickSound" src="assets/audio/mouse-click.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>

</html>
